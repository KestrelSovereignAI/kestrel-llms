name: Publish to PyPI

# Manual first-wave publishing for the kestrel-llms monorepo.
#
# PyPI Trusted Publisher binding:
#   owner:       KestrelSovereignAI
#   repository:  kestrel-llms
#   workflow:    publish.yml
#   environment: pypi
#
# Publish dependency packages before packages that reference them:
#   1. kestrel-llm-openai-compat
#   2. kestrel-llm-deepseek
#   3. kestrel-llm-xai
#   4. kestrel-llm-kimi
#   5. kestrel-llm-vertex
#   6. kestrel-llms

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Provider package to publish"
        required: true
        type: choice
        options:
          - kestrel-llm-openai-compat
          - kestrel-llm-deepseek
          - kestrel-llm-xai
          - kestrel-llm-kimi
          - kestrel-llm-vertex
          - kestrel-llms
      ref:
        description: "Git ref to publish"
        required: false
        default: main
      use_pypi_environment:
        description: "Use the GitHub pypi environment claim"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify provider packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install test environment
        run: uv sync --group test

      - name: Verify packages
        run: scripts/llm_provider_packages.sh verify

  build:
    name: Build selected package
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Build selected package
        run: |
          rm -rf dist
          uv build --package "${{ inputs.package }}" --out-dir dist

      - name: Show artifacts
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.package }}
          path: dist/
          if-no-files-found: error

  publish-with-environment:
    name: Publish selected package with pypi environment
    needs: build
    if: inputs.use_pypi_environment
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.package }}
          path: dist/

      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-without-environment:
    name: Publish selected package without environment
    needs: build
    if: ${{ !inputs.use_pypi_environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.package }}
          path: dist/

      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
