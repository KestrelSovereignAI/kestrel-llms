name: Refresh Repo Map

# Regenerates REPO_MAP.md — the generated per-file code index linked from
# AGENTS.md. Vendored ecosystem-wide; see kestrel-sovereign docs/ECOSYSTEM.md.

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily — off-hours, off-the-hour to avoid cron pile-up
  workflow_dispatch:

# Note: this workflow does NOT run on PRs. The map has no timestamp, so the
# nightly job commits only when the tree actually changed since the last run.

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Regenerate REPO_MAP.md
        run: python scripts/generate_repo_map.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet REPO_MAP.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "REPO_MAP.md unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "REPO_MAP.md changed; preparing commit."
            git diff --stat REPO_MAP.md
          fi

      - name: Commit & push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "kestrel-agent[bot]"
          git config user.email "kestrel-agent[bot]@users.noreply.github.com"
          git add REPO_MAP.md
          git commit -m "chore(repo-map): nightly regeneration"
          git push
