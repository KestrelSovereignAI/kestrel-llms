name: Claude Review Gate

# Enforces the Claude CLI PR review policy (docs/code_reviews/CLAUDE_PR_REVIEW.md)
# WITHOUT running Claude in CI. The review runs locally on a maintainer's machine
# via scripts/claude_pr_review.sh; this job only verifies that the resulting
# evidence artifact was committed and carries a substantive body. It reads a
# single markdown file and never executes checked-out code, so it needs no
# secrets and is safe on fork PRs (no ANTHROPIC_API_KEY exposure).

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: claude-review-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4

      - name: Verify Claude review artifact is present
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: scripts/verify_claude_review.sh "${PR_NUMBER}"

  test-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4

      - name: Test the verify script
        run: tests/gate/test_verify_claude_review.sh
