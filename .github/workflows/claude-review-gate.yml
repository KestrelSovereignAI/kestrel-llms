name: Claude Review Gate

# Enforces the Claude CLI PR review policy (docs/code_reviews/CLAUDE_PR_REVIEW.md)
# WITHOUT running Claude in CI. The review runs locally on a maintainer's machine
# via scripts/claude_pr_review.sh; this job only verifies that the resulting
# evidence artifact was committed to the PR. It reads a single markdown file and
# never executes checked-out code, so it needs no secrets and is safe on fork PRs.

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4

      - name: Verify Claude review artifact is present
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          file="docs/code_reviews/claude-pr-${PR_NUMBER}.md"

          if [[ ! -f "$file" ]]; then
            echo "::error::Missing Claude review artifact: ${file}"
            echo "Run 'scripts/claude_pr_review.sh ${PR_NUMBER}' locally, then commit ${file}."
            echo "See docs/code_reviews/CLAUDE_PR_REVIEW.md for the review policy."
            exit 1
          fi

          # Header must name this exact PR (guards against copying a stale review).
          if ! grep -qx "# Claude Review: PR #${PR_NUMBER}" "$file"; then
            echo "::error::${file} header must be exactly '# Claude Review: PR #${PR_NUMBER}'"
            exit 1
          fi

          # Body must link back to this PR's canonical URL.
          if ! grep -q "/pull/${PR_NUMBER}\b" "$file"; then
            echo "::error::${file} must reference this PR's URL (.../pull/${PR_NUMBER})"
            exit 1
          fi

          echo "OK: Claude review artifact present and matches PR #${PR_NUMBER}: ${file}"
